<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💎 3D Crystal Quiz Universe 💎</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;800&display=swap');

        :root {
            --primary-3d: #00f2ff;
            --secondary-3d: #7000ff;
            --glass-bg: rgba(10, 10, 20, 0.7);
            --glass-border: rgba(0, 242, 255, 0.3);
            --text-main: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden !important;
            background: #050505;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
        }

        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 2000px;
        }

        .container {
            width: 95%; max-width: 1100px;
            height: 90%; max-height: 850px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(1.5);
            -webkit-backdrop-filter: blur(20px) saturate(1.5);
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            box-shadow: 
                0 0 50px rgba(0, 242, 255, 0.1),
                inset 0 0 20px rgba(0, 242, 255, 0.05);
            display: flex; flex-direction: column;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            position: relative; z-index: 10;
            animation: float3D 6s ease-in-out infinite;
        }

        @keyframes float3D {
            0%, 100% { transform: translateZ(20px) rotateX(0deg); }
            50% { transform: translateZ(80px) rotateX(1deg); }
        }

        .header {
            padding: 25px;
            background: rgba(0, 0, 0, 0.3);
            text-align: center;
            border-bottom: 2px solid var(--glass-border);
            border-top-left-radius: 40px;
            border-top-right-radius: 40px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2em;
            font-weight: 900;
            background: linear-gradient(90deg, #00f2ff, #7000ff, #00f2ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textFlow 4s linear infinite;
            letter-spacing: 2px;
        }

        @keyframes textFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .content {
            flex: 1; padding: 30px;
            overflow-y: auto; display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .chapter-selection {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            height: 100%;
            align-items: center;
        }

        .chapter-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            transform-style: preserve-3d;
        }

        .chapter-card:hover {
            background: rgba(0, 242, 255, 0.1);
            border-color: var(--primary-3d);
            transform: translateZ(50px) rotateY(10deg);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 30px rgba(0, 242, 255, 0.3);
        }

        .chapter-card h3 { font-size: 1.8em; color: var(--primary-3d); margin-bottom: 15px; }
        .chapter-card .mcq-count { font-size: 3.5em; font-weight: 800; margin-bottom: 10px; }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(0, 242, 255, 0.05);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            margin-bottom: 25px;
        }

        .question-timer { font-size: 2.2em; font-weight: 800; color: #ff0055; text-shadow: 0 0 15px rgba(255, 0, 85, 0.4); }

        .question-text {
            font-size: 1.6em;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 30px;
            color: #fff;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .option {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px 25px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.2em;
            display: flex;
            align-items: center;
        }

        .option:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary-3d);
            transform: scale(1.02) translateZ(20px);
        }

        .option.selected {
            background: var(--primary-3d);
            color: #000;
            font-weight: 800;
            box-shadow: 0 0 25px var(--primary-3d);
        }

        .option.correct { background: #00ff88 !important; color: #000 !important; }
        .option.wrong { background: #ff0055 !important; color: #fff !important; }

        .btn {
            padding: 15px 40px;
            border-radius: 15px;
            font-size: 1.2em;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            border: none;
        }

        .btn-primary { background: var(--primary-3d); color: #000; }
        .btn-secondary { background: rgba(255, 255, 255, 0.1); color: #fff; }
        .btn:hover { transform: translateY(-5px) scale(1.05); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        .question-card {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 0;
            overflow-y: auto;
            padding: 10px;
            transform-style: preserve-3d;
        }

        .flip-3d {
            animation: flipHard 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes flipHard {
            0% { transform: rotateY(0deg) translateZ(0); opacity: 1; }
            50% { transform: rotateY(90deg) translateZ(100px); opacity: 0.5; }
            100% { transform: rotateY(0deg) translateZ(0); opacity: 1; }
        }

        .result-score {
            font-size: 6em;
            font-weight: 900;
            color: var(--primary-3d);
            text-shadow: 0 0 40px var(--primary-3d);
        }

        @media (max-width: 768px) {
            .chapter-selection { grid-template-columns: 1fr; }
            .options { grid-template-columns: 1fr; }
            .header h1 { font-size: 1.5em; }
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <script>
        // THREE.JS SCENE SETUP
        let scene, camera, renderer, particles;
        const mouse = { x: 0, y: 0 };

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            // Particles
            const geometry = new THREE.BufferGeometry();
            const vertices = [];
            for (let i = 0; i < 15000; i++) {
                vertices.push(
                    Math.random() * 2000 - 1000,
                    Math.random() * 2000 - 1000,
                    Math.random() * 2000 - 1000
                );
            }
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            const material = new THREE.PointsMaterial({ size: 2, color: 0x00f2ff, transparent: true, opacity: 0.8 });
            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            camera.position.z = 500;
        }

        function animate() {
            requestAnimationFrame(animate);
            particles.rotation.y += 0.001;
            particles.rotation.x += 0.0005;

            // Mouse Interaction
            camera.position.x += (mouse.x * 200 - camera.position.x) * 0.05;
            camera.position.y += (-mouse.y * 200 - camera.position.y) * 0.05;
            camera.lookAt(scene.position);

            renderer.render(scene, camera);
        }

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = (e.clientY / window.innerHeight) * 2 - 1;

            // Subtle Container Tilt
            const container = document.querySelector('.container');
            if(container) {
                const rotX = -mouse.y * 5;
                const rotY = mouse.x * 5;
                container.style.transform = `translateZ(50px) rotateX(${rotX}deg) rotateY(${rotY}deg)`;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init3D();
        animate();
    </script>

    <div class="container">
        <div class="header">
            <h1>💎 3D Crystal Quiz Universe 💎</h1>
        </div>

        <div class="content">
            <!-- Chapter Selection -->
            <div id="chapterSelection" class="chapter-selection">
                <div class="chapter-card" onclick="startQuiz(12)">
                    <h3>Chapter 12</h3>
                    <div class="mcq-count">150</div>
                    <p>AI Agent Factory Paradigm</p>
                </div>
                <div class="chapter-card" onclick="startQuiz(13)">
                    <h3>Chapter 13</h3>
                    <div class="mcq-count">150</div>
                    <p>Markdown & Instructions</p>
                </div>
                <div class="chapter-card" onclick="startQuiz(14)">
                    <h3>Chapter 14</h3>
                    <div class="mcq-count">150</div>
                    <p>Claude Code & Cowork</p>
                </div>
            </div>

            <!-- Quiz Container -->
            <div id="quizContainer" class="quiz-container">
                <div class="quiz-header">
                    <div>
                        <div style="font-size: 0.8em; opacity: 0.8;">TIME</div>
                        <div id="totalTimer">00:00</div>
                    </div>
                    <div class="question-timer" id="questionTimer">60s</div>
                    <div>
                        <div id="currentQInfo" style="font-size: 0.8em; opacity: 0.8;">Q <span id="currentQ">1</span>/<span id="totalQ">150</span></div>
                        <div id="scoreInfo">Score: <span id="score">0</span></div>
                    </div>
                </div>

                <div class="question-card">
                    <div class="question-text" id="questionText"></div>
                    <div class="options" id="optionsContainer"></div>
                </div>

                <div class="navigation">
                    <button class="btn btn-secondary" onclick="previousQuestion()" id="prevBtn">Previous</button>
                    <button class="btn btn-primary" onclick="nextQuestion()" id="nextBtn">Next</button>
                    <button class="btn btn-primary" onclick="submitQuiz()" id="submitBtn" style="display:none;">Finish</button>
                </div>
            </div>

            <!-- Result Container -->
            <div id="resultContainer" class="result-container">
                <h2 style="font-family: 'Playfair Display'; color: var(--primary-rose);">Quiz Results</h2>
                <div class="result-score" id="finalScore">0%</div>
                <div id="resultEmoji" style="font-size: 3em;">🌹</div>
                <div class="result-message" id="resultMessage" style="margin: 10px 0; font-weight: 700; font-size: 1.2em;"></div>

                <div class="result-details">
                    <div class="result-item"><span>MCQs</span> <span id="correctAnswers">0</span>/<span id="totalQuestions">0</span></div>
                    <div class="result-item"><span>Grade</span> <span id="gradeDisplay">-</span></div>
                    <div class="result-item"><span>Status</span> <span id="passFailStatus">-</span></div>
                    <div class="result-item"><span>Time</span> <span id="timeTaken">0</span></div>

                    <!-- Hidden elements for script compatibility -->
                    <span id="obtainedMarks" style="display:none;">0</span>
                    <span id="totalMarksDisplay" style="display:none;">0</span>
                    <span id="passingMarks" style="display:none;">0</span>
                    <span id="percentage" style="display:none;">0%</span>
                    <span id="totalScore" style="display:none;">0</span>
                    <span id="wrongAnswers" style="display:none;">0</span>
                </div>

                <button class="btn btn-primary" onclick="restartQuiz()" style="width: 100%; margin-top: 20px;">Try Again</button>
            </div>
        </div>
    </div>

    <script src="quiz-data.js"></script>
    <script src="quiz-app-updated.js"></script>
</body>
</html>
