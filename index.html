<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌹 Midnight Rose Quiz Experience 🌹</title>
    <style>
        :root {
            --midnight-bg: #1a0624;
            --rose-primary: #e7a79a;
            --rose-dark: #b87a6e;
            --velvet-purple: #4a154b;
            --cream-white: #fffafa;
            --glass-bg: rgba(255, 250, 250, 0.95);
            --romantic-gradient: linear-gradient(135deg, #4a154b 0%, #1a0624 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden !important;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        body {
            font-family: 'Optima', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--romantic-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 2000px;
        }

        /* Ambient Petals */
        .petal {
            position: fixed;
            color: var(--rose-primary);
            font-size: 15px;
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
            animation: drift 12s linear infinite;
        }

        @keyframes drift {
            0% { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(110vh) rotate(720deg) translateX(100px); opacity: 0; }
        }

        .container {
            width: 95%;
            max-width: 1100px;
            height: 90%;
            max-height: 90%;
            background: var(--glass-bg);
            border-radius: 20px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8),
                        0 0 0 1px rgba(231, 167, 154, 0.3) inset;
            display: flex;
            flex-direction: column;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        .container:hover {
            transform: rotateX(1deg) rotateY(-0.5deg);
        }

        .header {
            padding: 10px 20px;
            background: var(--midnight-bg);
            color: var(--rose-primary);
            text-align: center;
            border-bottom: 3px solid var(--rose-primary);
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 1.6em;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 300;
        }

        .content {
            flex: 1;
            padding: 15px 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 0;
        }

        .chapter-selection {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            height: 100%;
        }

        .chapter-card {
            background: var(--midnight-bg);
            color: var(--rose-primary);
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.4s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--velvet-purple);
            transform-style: preserve-3d;
        }

        .chapter-card:hover {
            background: var(--velvet-purple);
            transform: translateZ(30px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .chapter-card h3 { font-size: 1.5em; margin-bottom: 10px; }
        .chapter-card .mcq-count { font-size: 3em; font-weight: 700; margin: 10px 0; }

        .quiz-container {
            display: none;
            height: 100%;
            flex-direction: column;
        }

        .quiz-header {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 8px 15px;
            background: var(--midnight-bg);
            color: var(--rose-primary);
            border-radius: 10px;
            margin-bottom: 10px;
            text-align: center;
            align-items: center;
            flex-shrink: 0;
        }

        .question-timer { font-size: 1.5em; font-weight: 700; color: #fff; }

        .question-card {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 0;
            overflow: hidden;
        }

        .question-text {
            font-size: 1.15em;
            color: var(--midnight-bg);
            margin-bottom: 12px;
            font-weight: 600;
            line-height: 1.3;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .option {
            background: #fff;
            padding: 10px 14px;
            border-radius: 10px;
            border: 2px solid var(--rose-primary);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95em;
            color: #444;
            display: flex;
            align-items: center;
        }

        .option:hover {
            background: var(--rose-primary);
            color: #fff;
            transform: scale(1.02);
        }

        .option.selected {
            background: var(--midnight-bg);
            color: var(--rose-primary);
            border-color: var(--midnight-bg);
        }

        .option.correct { background: #2d6a4f !important; color: white !important; }
        .option.wrong { background: #7b1e1e !important; color: white !important; }

        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            flex-shrink: 0;
        }

        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .btn-primary { background: var(--midnight-bg); color: var(--rose-primary); }
        .btn-secondary { background: var(--rose-primary); color: var(--midnight-bg); }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        .result-container {
            display: none;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .result-score {
            font-size: 3.5em;
            font-weight: 900;
            color: var(--midnight-bg);
        }

        .result-details {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            width: 100%;
            max-width: 600px;
            margin: 10px 0;
        }

        .result-item {
            background: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--rose-primary);
            display: flex;
            justify-content: space-between;
        }

        .feedback-correct, .feedback-wrong {
            padding: 6px 10px;
            border-radius: 8px;
            margin-top: 8px;
            font-size: 0.9em;
            font-weight: 600;
            text-align: center;
            flex-shrink: 0;
        }

        .feedback-correct {
            background: #d4edda;
            color: #155724;
        }

        .feedback-wrong {
            background: #f8d7da;
            color: #721c24;
        }

        .timeout-message {
            padding: 6px 10px;
            border-radius: 8px;
            margin-top: 8px;
            font-size: 0.9em;
            font-weight: 600;
            text-align: center;
            background: #fff3cd;
            color: #856404;
            flex-shrink: 0;
        }

        @media (max-height: 700px) {
            .header h1 { font-size: 1.3em; }
            .header { padding: 6px 15px; }
            .question-text { font-size: 1em; margin-bottom: 8px; }
            .option { padding: 8px 10px; font-size: 0.85em; }
            .options { gap: 6px; }
            .navigation { margin-top: 6px; }
            .btn { padding: 8px 20px; font-size: 0.9em; }
            .quiz-header { padding: 6px 10px; margin-bottom: 6px; }
            .question-timer { font-size: 1.2em; }
            .result-score { font-size: 2.5em; }
            .content { padding: 10px 15px; }
        }
    </style>
</head>
<body>
    <script>
        function createPetal() {
            const petal = document.createElement('div');
            petal.className = 'petal';
            petal.innerHTML = '🌸';
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.animationDuration = (Math.random() * 5 + 7) + 's';
            document.body.appendChild(petal);
            setTimeout(() => petal.remove(), 12000);
        }
        setInterval(createPetal, 1500);
    </script>

    <div class="container">
        <div class="header">
            <h1>🌹 Midnight Rose Quiz Experience 🌹</h1>
        </div>

        <div class="content">
            <!-- Chapter Selection -->
            <div id="chapterSelection" class="chapter-selection">
                <div class="chapter-card" onclick="startQuiz(12)">
                    <h3>Chapter 12</h3>
                    <div class="mcq-count">150</div>
                    <p>MCQs</p>
                </div>
                <div class="chapter-card" onclick="startQuiz(13)">
                    <h3>Chapter 13</h3>
                    <div class="mcq-count">150</div>
                    <p>MCQs</p>
                </div>
                <div class="chapter-card" onclick="startQuiz(14)">
                    <h3>Chapter 14</h3>
                    <div class="mcq-count">150</div>
                    <p>MCQs</p>
                </div>
            </div>

            <!-- Quiz Container -->
            <div id="quizContainer" class="quiz-container">
                <div class="quiz-header">
                    <div>
                        <div style="font-size: 0.8em; opacity: 0.8;">TIME</div>
                        <div id="totalTimer">00:00</div>
                    </div>
                    <div class="question-timer" id="questionTimer">60s</div>
                    <div>
                        <div id="currentQInfo" style="font-size: 0.8em; opacity: 0.8;">Q <span id="currentQ">1</span>/<span id="totalQ">150</span></div>
                        <div id="scoreInfo">Score: <span id="score">0</span></div>
                    </div>
                </div>

                <div class="question-card">
                    <div class="question-text" id="questionText"></div>
                    <div class="options" id="optionsContainer"></div>
                </div>

                <div class="navigation">
                    <button class="btn btn-secondary" onclick="previousQuestion()" id="prevBtn">Previous</button>
                    <button class="btn btn-primary" onclick="nextQuestion()" id="nextBtn">Next</button>
                    <button class="btn btn-primary" onclick="submitQuiz()" id="submitBtn" style="display:none;">Finish</button>
                </div>
            </div>

            <!-- Result Container -->
            <div id="resultContainer" class="result-container">
                <h2 style="color: var(--midnight-bg);">Quiz Results</h2>
                <div class="result-score" id="finalScore">0%</div>
                <div id="resultEmoji" style="font-size: 2em;">🌹</div>
                <div class="result-message" id="resultMessage" style="margin: 5px 0; font-weight: 700;"></div>

                <div class="result-details">
                    <div class="result-item"><span>Total:</span> <span id="totalQuestions">0</span></div>
                    <div class="result-item"><span>Correct:</span> <span id="correctAnswers">0</span></div>
                    <div class="result-item"><span>Wrong:</span> <span id="wrongAnswers">0</span></div>
                    <div class="result-item"><span>Grade:</span> <span id="gradeDisplay"></span></div>
                    <div class="result-item"><span>Status:</span> <span id="passFailStatus"></span></div>
                    <div class="result-item"><span>Time:</span> <span id="timeTaken">0</span></div>

                    <!-- Hidden elements for script compatibility -->
                    <span id="obtainedMarks" style="display:none;">0</span>
                    <span id="totalMarksDisplay" style="display:none;">0</span>
                    <span id="passingMarks" style="display:none;">0</span>
                    <span id="percentage" style="display:none;">0%</span>
                </div>

                <button class="btn btn-primary" onclick="restartQuiz()" style="width: 100%;">Try Again</button>
            </div>
        </div>
    </div>

    <script src="quiz-data.js"></script>
    <script src="quiz-app-updated.js"></script>
</body>
</html>
