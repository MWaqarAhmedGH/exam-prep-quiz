<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💎 3D Crystal Quiz Universe 💎</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;800&display=swap');

        :root {
            --primary-3d: #00f2ff;
            --secondary-3d: #7000ff;
            --text-main: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden !important;
            background: #050505;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
        }

        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 2000px;
        }

        /* The Main Wrapper - Transparent */
        .container {
            width: 95%; max-width: 1200px;
            height: 95vh;
            display: flex; flex-direction: column;
            transform-style: preserve-3d;
            position: relative; z-index: 10;
            overflow-y: auto;
            padding: 20px;
        }

        /* Custom Scrollbar for 3D look */
        .container::-webkit-scrollbar { width: 8px; }
        .container::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        .container::-webkit-scrollbar-thumb { background: var(--primary-3d); border-radius: 10px; }

        /* Title floating in 3D space */
        .main-title {
            text-align: center;
            padding: 40px 0;
            font-family: 'Playfair Display', serif;
            font-size: 3em;
            font-weight: 900;
            background: linear-gradient(90deg, #00f2ff, #7000ff, #00f2ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textFlow 4s linear infinite;
            letter-spacing: 3px;
            filter: drop-shadow(0 0 20px rgba(0, 242, 255, 0.3));
            transform: translateZ(100px);
        }

        @keyframes textFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .chapter-selection {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            width: 100%;
            transform-style: preserve-3d;
        }

        .chapter-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 30px;
            padding: 50px 20px;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            transform-style: preserve-3d;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .chapter-card:hover {
            background: rgba(0, 242, 255, 0.15);
            border-color: var(--primary-3d);
            transform: translateZ(80px) rotateY(5deg);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 40px rgba(0, 242, 255, 0.4);
        }

        .chapter-card h3 { font-size: 1.8em; color: var(--primary-3d); margin-bottom: 15px; font-family: 'Playfair Display'; }
        .chapter-card .mcq-count { font-size: 4em; font-weight: 800; color: #fff; margin-bottom: 10px; }
        .chapter-card p { font-size: 1.1em; opacity: 0.8; color: #e0e0e0; }

        /* Quiz UI - Floating Glass Card */
        .quiz-container {
            display: none;
            width: 100%; max-width: 900px;
            background: rgba(10, 10, 20, 0.8);
            backdrop-filter: blur(25px);
            border-radius: 40px;
            border: 1px solid rgba(0, 242, 255, 0.3);
            padding: 40px;
            transform: translateZ(50px);
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: rgba(0, 242, 255, 0.05);
            border-radius: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(0, 242, 255, 0.1);
        }

        .question-timer { font-size: 2.2em; font-weight: 800; color: #ff0055; }

        .question-text {
            font-size: 1.6em;
            font-weight: 700;
            margin-bottom: 30px;
            color: #fff;
            line-height: 1.5;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .option {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.1em;
        }

        .option:hover { background: rgba(0, 242, 255, 0.1); border-color: var(--primary-3d); transform: translateX(5px); }
        .option.selected { background: var(--primary-3d); color: #000; font-weight: 800; }
        .option.correct { background: #00ff88 !important; color: #000 !important; }
        .option.wrong { background: #ff0055 !important; color: #fff !important; }

        .btn {
            padding: 15px 35px;
            border-radius: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            border: none;
            margin-top: 20px;
        }

        .btn-primary { background: var(--primary-3d); color: #000; }
        .btn-secondary { background: rgba(255, 255, 255, 0.1); color: #fff; }

        /* Result View */
        .result-container {
            display: none;
            text-align: center;
            background: rgba(10, 10, 20, 0.9);
            padding: 60px;
            border-radius: 40px;
            border: 1px solid var(--primary-3d);
            width: 100%; max-width: 800px;
        }

        .result-score { font-size: 6em; font-weight: 900; color: var(--primary-3d); text-shadow: 0 0 30px var(--primary-3d); }

        .result-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 30px 0;
        }

        .result-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(0, 242, 255, 0.1);
        }

        .result-item span:last-child { color: var(--primary-3d); font-weight: 800; font-size: 1.5em; display: block; }

        @keyframes flipHard {
            0% { transform: rotateY(0deg); opacity: 1; }
            50% { transform: rotateY(90deg); opacity: 0; }
            100% { transform: rotateY(0deg); opacity: 1; }
        }
        .flip-3d { animation: flipHard 0.5s ease-in-out; }

        @media (max-width: 768px) {
            .chapter-selection { grid-template-columns: 1fr; }
            .options { grid-template-columns: 1fr; }
            .main-title { font-size: 1.8em; }
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <script>
        let scene, camera, renderer, particles;
        const mouse = { x: 0, y: 0 };

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            const geometry = new THREE.BufferGeometry();
            const vertices = [];
            for (let i = 0; i < 10000; i++) {
                vertices.push(Math.random()*2000-1000, Math.random()*2000-1000, Math.random()*2000-1000);
            }
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            particles = new THREE.Points(geometry, new THREE.PointsMaterial({ size: 2, color: 0x00f2ff, transparent: true, opacity: 0.6 }));
            scene.add(particles);
            camera.position.z = 500;
        }

        function animate() {
            requestAnimationFrame(animate);
            particles.rotation.y += 0.001;
            camera.position.x += (mouse.x * 200 - camera.position.x) * 0.05;
            camera.position.y += (-mouse.y * 200 - camera.position.y) * 0.05;
            camera.lookAt(scene.position);
            renderer.render(scene, camera);
        }

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = (e.clientY / window.innerHeight) * 2 - 1;
            const container = document.querySelector('.container');
            if(container) {
                container.style.transform = `rotateX(${-mouse.y * 5}deg) rotateY(${mouse.x * 5}deg)`;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init3D();
        animate();
    </script>

    <div class="container">
        <h1 class="main-title" id="appTitle">💎 3D Crystal Quiz Universe 💎</h1>

        <div class="content">
            <!-- Landing Page: ONLY these items -->
            <div id="chapterSelection" class="chapter-selection">
                <div class="chapter-card" onclick="startQuiz(12)">
                    <h3>Chapter 12</h3>
                    <div class="mcq-count">150</div>
                    <p>AI Agent Factory Paradigm</p>
                </div>
                <div class="chapter-card" onclick="startQuiz(13)">
                    <h3>Chapter 13</h3>
                    <div class="mcq-count">150</div>
                    <p>Markdown & Instructions</p>
                </div>
                <div class="chapter-card" onclick="startQuiz(14)">
                    <h3>Chapter 14</h3>
                    <div class="mcq-count">150</div>
                    <p>Claude Code & Cowork</p>
                </div>
            </div>

            <!-- Quiz Container: Hidden on landing -->
            <div id="quizContainer" class="quiz-container">
                <div class="quiz-header">
                    <div>TIME: <span id="totalTimer">00:00</span></div>
                    <div class="question-timer" id="questionTimer">60s</div>
                    <div>Q: <span id="currentQ">1</span>/<span id="totalQ">150</span> | Score: <span id="score">0</span></div>
                </div>

                <div class="question-card">
                    <div class="question-text" id="questionText"></div>
                    <div class="options" id="optionsContainer"></div>
                </div>

                <div style="display: flex; justify-content: space-between;">
                    <button class="btn btn-secondary" onclick="previousQuestion()" id="prevBtn">Back</button>
                    <button class="btn btn-primary" onclick="nextQuestion()" id="nextBtn">Next</button>
                    <button class="btn btn-primary" onclick="submitQuiz()" id="submitBtn" style="display:none;">Finish</button>
                </div>
            </div>

            <!-- Result Container: Hidden on landing -->
            <div id="resultContainer" class="result-container">
                <h2 id="resultEmoji" style="font-size: 4em;">🏆</h2>
                <div class="result-score" id="finalScore">0%</div>
                <p id="resultMessage" style="margin: 20px 0; font-size: 1.2em;"></p>

                <div class="result-details">
                    <div class="result-item"><span>Correct</span><span id="correctAnswers">0</span></div>
                    <div class="result-item"><span>Grade</span><span id="gradeDisplay">-</span></div>
                    <div class="result-item"><span>Status</span><span id="passFailStatus">-</span></div>
                    <div class="result-item"><span>Time</span><span id="timeTaken">0</span></div>
                    
                    <!-- Hidden helpers -->
                    <span id="totalQuestions" style="display:none;"></span>
                    <span id="obtainedMarks" style="display:none;"></span>
                    <span id="totalMarksDisplay" style="display:none;"></span>
                    <span id="passingMarks" style="display:none;"></span>
                    <span id="percentage" style="display:none;"></span>
                    <span id="totalScore" style="display:none;"></span>
                    <span id="wrongAnswers" style="display:none;"></span>
                </div>

                <button class="btn btn-primary" onclick="restartQuiz()" style="width: 100%;">Try Again</button>
            </div>
        </div>
    </div>

    <script src="quiz-data.js"></script>
    <script src="quiz-app-updated.js"></script>
</body>
</html>
